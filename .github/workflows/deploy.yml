name: GitHub Actions Vercel Prebuilt Deploy
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Stable Database-Free v1 Release Tag
        uses: actions/checkout@v4
        with:
          # We pull the precise release version that handles 100% offline client mode
          repository: 'lobehub/lobe-chat'
          ref: 'v1.142.6'

      - name: Setup pnpm Package Manager
        uses: pnpm/action-setup@v4
        with:
          package_json_file: 'package.json'

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install System Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Vercel Global CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Configuration
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Compile and Build via GitHub 16GB Memory Environment
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          ACCESS_CODE: ${{ secrets.ACCESS_CODE }}
          # This configures the v1 system to run without external database checks
          NEXT_PUBLIC_SERVICE_MODE: client

      - name: Upload Finished Prebuilt Package to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
