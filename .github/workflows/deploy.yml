name: GitHub Actions Vercel Prebuilt Deploy
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm Package Manager
        uses: pnpm/action-setup@v4
        with:
          package_json_file: 'package.json'

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install System Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Vercel Global CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Configuration
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Compile and Build via GitHub 7GB Memory Environment
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          ACCESS_CODE: ${{ secrets.ACCESS_CODE }}
          # 1. We put this back so the encryption engine is satisfied
          KEY_VAULTS_SECRET: ${{ secrets.KEY_VAULTS_SECRET }}
          # 2. We give it a fake local file link so it stops looking for PostgreSQL cloud servers
          DATABASE_URL: file:./dev.db
          DATABASE_DRIVER: sqlite
          # 3. We turn off all authentication scans that crash the build
          NEXT_PUBLIC_ENABLE_OAUTH_LOGINS: "false"
          NEXT_PUBLIC_ENABLE_NEXT_AUTH: "false"
