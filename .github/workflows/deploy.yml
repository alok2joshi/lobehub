name: GitHub Actions Vercel Prebuilt Deploy
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Stable Database-Free v1 Release Tag
        uses: actions/checkout@v4
        with:
          repository: 'lobehub/lobe-chat'
          ref: 'v1.142.6'

      - name: Setup pnpm Package Manager
        uses: pnpm/action-setup@v4
        with:
          package_json_file: 'package.json'

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install System Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Patch Next.js TypeScript Config to Ignore Type Errors
        # This script targets next.config.ts and forces it to completely ignore TypeScript and ESLint during compilation
        run: |
          if [ -f next.config.ts ]; then
            sed -i 's/typescript:\s*{/typescript: { ignoreBuildErrors: true, /g' next.config.ts
            sed -i 's/eslint:\s*{/eslint: { ignoreConfigFile: true, ignoreDuringBuilds: true, /g' next.config.ts
          elif [ -f next.config.js ]; then
            sed -i 's/typescript:\s*{/typescript: { ignoreBuildErrors: true, /g' next.config.js
            sed -i 's/eslint:\s*{/eslint: { ignoreConfigFile: true, ignoreDuringBuilds: true, /g' next.config.js
          fi

      - name: Install Vercel Global CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Configuration
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Compile and Build via GitHub 16GB Memory Environment
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          ACCESS_CODE: ${{ secrets.ACCESS_CODE }}
          NEXT_PUBLIC_SERVICE_MODE: client

      - name: Upload Finished Prebuilt Package to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
