name: GitHub Actions Vercel Prebuilt Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm Package Manager
        uses: pnpm/action-setup@v4

      - name: Setup Node.js Environment with pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel Global CLI
        run: pnpm add -g vercel

      - name: Pull Vercel Environment Configuration
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Compile and Build via GitHub 7GB Memory Environment
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          ACCESS_CODE: ${{ secrets.ACCESS_CODE }}
          KEY_VAULTS_SECRET: ${{ secrets.KEY_VAULTS_SECRET }}
          NEXT_PUBLIC_SERVICE_MODE: "false"
          NEXT_PUBLIC_ENABLED_SERVER_SERVICE: "false"
          NEXT_PUBLIC_ENABLE_OAUTH_LOGINS: "false"
          NEXT_PUBLIC_ENABLE_NEXT_AUTH: "false"

      - name: Verify Build Output
        run: |
          if [ ! -d ".vercel/output" ]; then
            echo "❌ Build failed - no output directory found"
            exit 1
          fi
          echo "✅ Build successful - output directory exists"

      - name: Deploy to Vercel Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deployment Success Notification
        if: success()
        run: echo "✅ Deployment to Vercel production completed successfully!"

      - name: Deployment Failure Notification
        if: failure()
        run: |
          echo "❌ Deployment to Vercel production failed!"
          exit 1
